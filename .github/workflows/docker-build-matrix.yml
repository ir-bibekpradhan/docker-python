name: Docker Build Matrix

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rockylinux-8
            base_image: rockylinux:8
            dockerfile: Dockerfile.os

          - name: python-312-slim-bookworm
            base_image: python:3.12-slim-bookworm
            dockerfile: Dockerfile.python

          - name: python-312
            base_image: python:3.12
            dockerfile: Dockerfile.python

          - name: python-312-alpine
            base_image: python:3.12-alpine
            dockerfile: Dockerfile.alpine

          - name: python-395
            base_image: python:3.9.5
            dockerfile: Dockerfile.python

          - name: ubuntu-2204
            base_image: ubuntu:22.04
            dockerfile: Dockerfile.os

          - name: node-12
            base_image: node:12
            dockerfile: Dockerfile.node12

          - name: envoy-1330
            base_image: envoyproxy/envoy:v1.33.0
            dockerfile: Dockerfile.envoy

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test \
            --secret id=pse-ca,src=/etc/ssl/certs/pse.pem \
            --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 \
            -t docker-python:${{ matrix.name }} \
            .

      - name: Smoke test container
        run: |
          docker run --rm docker-python:${{ matrix.name }}

      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Setup End =============
